body {
display: flex;
align-items: center;
justify-content: space-between;
background-color: #191919;
color: #ffffff;
font-family: 'Montserrat', 'Segoe UI', sans-serif;
font-weight: 400;
min-height: 100vh;
line-height: 1.5;
padding: 3rem 2rem;
}

.page-title {
font-weight: 700;
font-size: 2rem;
color: #2e8b57;
margin-bottom: 0.4rem;
}

.page-subtitle {
font-size: 0.95rem;
color: #aaaaaa;
margin-bottom: 3rem;
}

/* ── Link grid ── */
.link-grid {
display: flex;
flex-wrap: wrap;
gap: 0.75rem;
}

/* ── Buttons ── */
.link-btn {
display: inline-flex;
align-items: center;
gap: 0.5rem;
background-color: #191919;
color: #ffffff;
font-family: 'Montserrat', sans-serif;
font-weight: 400;
font-size: 0.9rem;
padding: 0.55rem 1.1rem;
border-radius: 8px;
border: 1.5px solid #1a1a1a;
text-decoration: none;
cursor: pointer;
transition:
border-color 0.2s ease,
box-shadow 0.2s ease,
transform 0.2s ease;
}

.link-btn:hover {
border-color: #2e8b57;
box-shadow: 0 0 18px 4px rgba(46, 139, 87, 0.22);
transform: rotate(3deg);
}

.link-tag {
font-size: 0.7rem;
color: #2e8b57;
background: rgba(46, 139, 87, 0.12);
padding: 0.1rem 0.4rem;
border-radius: 4px;
}
