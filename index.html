body {

/* ── Link grid ── */
.link-grid {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 0.75rem;
}

/* ── Buttons ── */
.link-btn {
display: inline-flex;
align-items: center;
background-color: #191919;
color: #ffffff;
font-family: 'Montserrat', 'Segoe UI', sans-serif;
font-weight: 400;
font-size: 2rem;
padding: 0.55rem 1.1rem;
border-radius: 18px;
border: 1.5px solid #1a1a1a;
text-decoration: none;
cursor: pointer;
transition:
border-color 0.2s ease,
box-shadow 0.2s ease,
transform 0.2s ease;
}

.link-btn:hover {
border-color: #2e8b57;
box-shadow: 0 0 18px 4px rgba(46, 139, 87, 0.22);
transform: rotate(3deg);
}
